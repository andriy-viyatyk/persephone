appId: com.viyatyk.persephone
productName: persephone
copyright: Copyright © Andriy Viyatyk

directories:
  output: release

# Files to include in the asar archive
files:
  - package.json
  - .vite/**/*
  - "!node_modules/**/{CHANGELOG.md,README.md,readme.md,LICENSE,license,LICENCE}"
  - "!node_modules/**/*.{ts,map}"

# Assets go into resources/ (outside asar), matching Forge behavior
extraResources:
  - from: assets
    to: assets

# Rust binaries sit next to the main exe (outside asar)
extraFiles:
  - from: launcher/target/release/persephone-launcher.exe
    to: persephone-launcher.exe
  - from: snip-tool/target/release/persephone-snip.exe
    to: persephone-snip.exe

asar: true

# Use Castlabs Electron for Widevine CDM (DRM) support
electronDownload:
  mirror: "https://github.com/castlabs/electron-releases/releases/download/v"

# VMP-sign the Electron binary for Widevine DRM (Netflix, Disney+, etc.)
# Uses afterSign (not afterPack) because on Windows VMP signing must happen
# AFTER code-signing (Authenticode/signtool), otherwise signtool overwrites the VMP signature.
# Set VMP_SIGN=true environment variable to enable signing.
afterSign: scripts/vmp-sign.mjs

win:
  icon: assets/icon.ico
  target:
    - target: nsis
    - target: zip

nsis:
  artifactName: "persephone-setup-${version}.${ext}"
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  allowElevation: true
  createDesktopShortcut: false
  createStartMenuShortcut: false
  menuCategory: Persephone
  shortcutName: Persephone
  runAfterFinish: true
  deleteAppDataOnUninstall: false
  include: build/installer.nsh

publish:
  provider: github
  owner: andriy-viyatyk
  repo: persephone
  releaseType: draft
