name: Build and Release
on:
  push:
    tags:
      - 'v*' # Triggers when you push a version tag like v1.0.0
  workflow_dispatch: # Allows manual trigger from any branch via GitHub UI

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # Gives the action permission to create a release
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust launcher
        run: cargo build --release
        working-directory: launcher

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build and Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:publish

      - name: Remove auto-update artifacts from release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release delete-asset "$TAG" latest.yml --yes || true
          # Delete blockmap files (pattern: *.blockmap)
          for asset in $(gh release view "$TAG" --json assets -q '.assets[].name' | grep '\.blockmap$'); do
            gh release delete-asset "$TAG" "$asset" --yes || true
          done
        shell: bash
